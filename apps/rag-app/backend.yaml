apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
    spec:
      containers:
      - name: backend
        image: rag-backend:v1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend-svc # 这就是前端server.js里引用的服务名
  namespace: default
spec:
  selector:
    app: rag-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

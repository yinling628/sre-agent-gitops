# --- 为etcd创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-etcd-pv
spec:
  capacity: { storage: 10Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-milvus-etcd
  hostPath: { path: "/data/milvus-etcd" }

---
# --- 为minio创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-minio-pv
spec:
  capacity: { storage: 20Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-milvus-minio
  hostPath: { path: "/data/milvus-minio" }

---
# --- 新增：为standalone组件创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-standalone-pv
spec:
  capacity: { storage: 50Gi } # standalone的默认申请是50Gi
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-milvus-standalone # 使用一个新的唯一类名
  hostPath: { path: "/data/milvus-standalone" }

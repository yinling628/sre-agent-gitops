# apps/milvus/pv.yaml
# --- 为etcd创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-etcd-pv
spec:
  capacity: { storage: 10Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  # storageClassName: local-milvus-etcd # <-- 删除这一行
  hostPath: { path: "/data/milvus-etcd" }
---
# --- 为minio创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-minio-pv
spec:
  capacity: { storage: 20Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  # storageClassName: local-milvus-minio # <-- 删除这一行
  hostPath: { path: "/data/milvus-minio" }
---
# --- 为standalone组件创建PV ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: milvus-standalone-pv
spec:
  capacity: { storage: 50Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  # storageClassName: local-milvus-standalone # <-- 删除这一行
  hostPath: { path: "/data/milvus-standalone" }

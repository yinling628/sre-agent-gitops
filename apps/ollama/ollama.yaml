apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
# --- 新增：直接定义一个PV指向宿主机路径 ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-pv
spec:
  # PV的容量
  capacity:
    storage: 10Gi
  # 访问模式
  accessModes:
    - ReadWriteOnce
  # 回收策略：Retain表示删除PVC后，数据保留在宿主机上
  persistentVolumeReclaimPolicy: Retain
  # 卷的类型是hostPath，指向我们在所有节点上创建的目录
  hostPath:
    path: "/data/ollama-models"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # 省略storageClassName，让K8s自动绑定到我们上面创建的PV
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: ollama } }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
---
# ... Service部分保持不变 ...
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: ollama }
  ports:
  - port: 11434
    targetPort: 11434

apiVersion: v1
kind: Namespace
metadata:
  name: ai-services
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  # --- 关键改动 ---
  storageClassName: local-hostpath # 1. 给PV指定一个明确的类名
  # -----------------
  hostPath:
    path: "/data/ollama-models"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai-services
spec:
  accessModes:
    - ReadWriteOnce
  # --- 关键改动 ---
  storageClassName: local-hostpath # 2. PVC申请同一个明确的类名
  # -----------------
  resources:
    requests:
      storage: 10Gi
---
# ... Deployment和Service部分保持不变 ...
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-services
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: ollama } }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: ai-services
spec:
  type: NodePort
  selector: { app: ollama }
  ports:
  - port: 11434
    targetPort: 11434
